# parameters/data_processing.yml

# --- Parámetros para la tabla de Estudiantes (ESTACA) ---
data_processing_estaca:
  central_col_fechas:
    - fecha_de_registro
    - cohorte
    - fecha_de_baja_t
    - fecha_de_baja_d
    - fecha_de_reingreso
    - fecha_grado
  
  central_col_emails:
    - usuario_institucional
    
  central_col_dd:
    - alianza
    - cohorte
    - nivel
    - programa
    - identificacion
    
  central_col_sort:
    - codigo_sis

# --- Parámetros para el Calendario Académico (CALACA) ---
data_processing_calaca:
  # Definición de columnas de entrada y procesamiento
  central_calaca_col_fechas: 
    - fecha_inicio
    - fecha_fin
    
  central_calaca_col_fechaingreso: fecha_ingreso
  central_calaca_col_fecha_inicial_semana: fecha_inicio
  central_calaca_col_fecha_final_semana: fecha_fin
  central_calaca_col_cohorte_inicial: cohorte_inicial
  
  central_calaca_col_sort:
    - cohorte_inicial
    - cohorte_actual
    - fecha_inicio
    - semana

  # Configuración del Student Journey
  central_calalaca_student_journey: 
    - onboarding
    - q1
    - qa
    
  central_calaca_journey_thresholds: 
    - 2
    - 4

  # Orden final de las columnas en el dataset extendido
  central_calaca_column_order:
    - cohorte
    - cohorte_inicial
    - fecha_ingreso
    - cohorte_actual
    - periodo_raw
    - bloque
    - fecha_inicio
    - fecha_fin
    - shifted_fecha_inicio
    - semana
    - semana_acumulada
    - month
    - mes_academico
    - mes_gregoriano
    - student_journey
    - tipo