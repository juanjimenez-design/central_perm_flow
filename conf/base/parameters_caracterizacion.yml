# This is a boilerplate parameters config generated for pipeline 'caracterizacion'
# using Kedro 1.2.0.
#
# Documentation for this file format can be found in "Parameters"
# Link: https://docs.kedro.org/en/1.2.0/configuration/parameters.html


# Parámetros para la limpieza y caracterización de la alianza Central
central_caracterizacion_params:
  # Columnas que deben transformarse a formato fecha
  col_fechas: 
    - fecha_creacion
    - fecha_nacimiento
    - inicio_clases

  # Columnas que contienen correos electrónicos para limpieza de objetos
  col_emails:
    - correo
    - correo_electronico_del_contacto_emergencia

  # Columnas para identificar duplicados (subset)
  col_dd:
    - identidad

  # Columnas para ordenar antes de eliminar duplicados
  col_sort:
    - identidad